<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17130f">
  <meta name="description" content="飲んだお酒を記録して、自分だけの酒図鑑を育てるアプリ">
  <title>酒ログ図鑑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260620-3">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="topbar">
      <button class="brand" type="button" data-route="home" aria-label="ホームへ">
        <span class="brand-mark">酒</span>
        <span><strong>酒ログ図鑑</strong><small>SAKE LOG ZUKAN</small></span>
      </button>
      <button class="icon-button header-add" type="button" data-route="form" aria-label="お酒を追加">＋</button>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="メインナビゲーション">
      <button type="button" data-route="home"><span class="nav-icon">⌂</span><span>ホーム</span></button>
      <button type="button" data-route="genres"><span class="nav-icon">▦</span><span>図鑑</span></button>
      <button type="button" class="add-nav" data-route="form"><span class="nav-icon">＋</span><span>追加</span></button>
      <button type="button" data-route="search"><span class="nav-icon">⌕</span><span>検索</span></button>
      <button type="button" data-route="stats"><span class="nav-icon">▥</span><span>統計</span></button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="dialog-root"></div>

  <script src="js/config.js?v=20260620-3"></script>
  <script src="js/storage.js?v=20260620-3"></script>
  <script src="js/render.js?v=20260620-3"></script>
  <script src="js/app.js?v=20260620-3"></script>
</body>
</html>
